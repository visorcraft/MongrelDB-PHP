name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit:
    name: PHPUnit unit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 8.4 is the supported minimum; 8.5 exercises the persistent-cURL and
        # http_get_last_response_headers() opt-in paths.
        php: ['8.4', '8.5']

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, json
          coverage: none
          ini-values: error_reporting=E_ALL

      - name: Validate composer.json
        run: composer validate --strict --no-check-publish

      - name: Cache Composer packages
        uses: actions/cache@v6
        with:
          path: ~/.cache/composer
          key: ${{ runner.os }}-php-${{ matrix.php }}-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-php-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Lint source
        run: find src tests -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Run unit tests
        run: vendor/bin/phpunit --colors=never --testsuite=unit

  live:
    # The layer that catches client/server contract drift. Builds the daemon,
    # starts it, and runs the live round-trip suite against a real server.
    name: Live integration (against mongreldb-server)
    runs-on: ubuntu-latest
    env:
      MONGRELDB_URL: http://127.0.0.1:8453

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: curl, json
          coverage: none

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache mongreldb-server binary
        uses: actions/cache@v6
        id: server-cache
        with:
          path: ~/.cargo/bin/mongreldb-server
          key: mongreldb-server-${{ runner.os }}-0.41.2

      - name: Install mongreldb-server
        if: steps.server-cache.outputs.cache-hit != 'true'
        run: cargo install mongreldb-server --version 0.41.2 --locked

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Initialize the database
        # mongreldb-server opens an existing catalog but does not create one,
        # so initialize the data directory with mongreldb-core::Database::create
        # first (the binary is already compiled from the install step above).
        run: |
          mkdir -p /tmp/mongreldb-init/src
          cat > /tmp/mongreldb-init/Cargo.toml <<'TOML'
          [package]
          name = "mdb-init"
          version = "0.0.0"
          edition = "2021"

          [dependencies]
          mongreldb-core = "=0.41.2"
          TOML
          cat > /tmp/mongreldb-init/src/main.rs <<'RS'
          fn main() {
              let dir = std::env::args().nth(1).expect("db dir arg");
              let _db = mongreldb_core::Database::create(&dir)
                  .expect("failed to create database catalog");
              println!("initialized mongreldb catalog at {dir}");
          }
          RS
          mkdir -p /tmp/mongreldb-data
          cargo run --quiet --manifest-path /tmp/mongreldb-init/Cargo.toml -- /tmp/mongreldb-data

      - name: Start mongreldb-server
        run: |
          mongreldb-server /tmp/mongreldb-data --port 8453 > /tmp/mongreldb-server.log 2>&1 &
          echo $! > /tmp/mongreldb-server.pid
          # Wait for the daemon to become healthy (max ~30s).
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8453/health >/dev/null 2>&1; then
              echo "mongreldb-server is healthy"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:8453/health >/dev/null || (cat /tmp/mongreldb-server.log && exit 1)

      - name: Run live tests
        run: vendor/bin/phpunit --colors=never --testsuite=live

      - name: Dump server log on failure
        if: failure()
        run: cat /tmp/mongreldb-server.log

      - name: Stop mongreldb-server
        if: always()
        run: |
          if [ -f /tmp/mongreldb-server.pid ]; then
            kill "$(cat /tmp/mongreldb-server.pid)" 2>/dev/null || true
          fi
